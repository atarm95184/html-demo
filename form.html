<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表單練習</title>
</head>
<body>
        <form action="">
            <label for="username">使用者名稱:</label>
            <input type="text" id="username" name="username">
            <br>
            <label for="age">使用者年齡:</label>
            <input required type="number" id="age" name="age">
            <br>
            <label for="email">使用者信箱:</label>
            <input type="email" id="email" name="email">
            <br>
            <label for="password">使用者密碼:</label>
            <input placeholder="請輸入6~8不重複字元" type="password" id="password" name="password">
            <button type="submit">註冊</button>
            <br>
            <!-- 選擇類 -->
            <input type="checkbox" id="agree"> <label for="agree">我同意</label>
        
            <input type="radio" name="gender" value="male"> 男
            <input type="radio" name="gender" value="female">女

            <!-- 特殊類型 -->
            <input type="date"> <!-- ⽇期選擇器 -->
            <input type="range" min="0" max="100"> <!-- 滑桿 -->
            <input type="color"> <!-- 顏色選擇器 -->
            <input type="file"> <!-- 檔案上傳 -->
            
        </form>
</body>
</html>
